---
name: Internal - Main - Continuous Integration

on: # yamllint disable-line rule:truthy
  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: read
  packages: write
  pull-requests: read
  id-token: write

jobs:
  arrange:
    name: Arrange
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [ -z "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "GitHub token secret is not set"
            exit 1
          fi
      - name: Delete existing packages if any
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/${{ github.repository_owner }}/packages/container/test-docker-build-images%2Ftest-mono-arch || echo "No existing mono-arch package to delete"

          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /orgs/${{ github.repository_owner }}/packages/container/test-docker-build-images%2Ftest-multi-arch || echo "No existing multi-arch package to delete"

  act-build-images:
    name: Act - Build multi-arch and mono-arch images
    needs: arrange
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@feat/optimize-docker-build-images-caching-and-signing
    secrets:
      oci-registry-password: ${{ secrets.GITHUB_TOKEN }}
    with:
      sign: true
      images: |
        [
          {
            "name": "test-mono-arch",
            "context": ".",
            "dockerfile": "./tests/application/Dockerfile",
            "build-args": { "BUILD_RUN_ID": "${{ github.run_id }}" },
            "target": "prod",
            "platforms": ["linux/amd64"],
            "tag": "0.1.0"
          }
        ]

  assert-signed-images:
    name: Assert - Signed images
    needs: act-build-images
    runs-on: ubuntu-latest
    steps:
      - uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Verify mono-arch image signature (Signed with GitHub OIDC Token)
        run: |
          cosign verify --key github://hoverkraft-tech/ci-bot --output json ghcr.io/hoverkraft-tech/test-mono-arch:0.1.0 | jq .

      # - name: Verify multi-arch image signature (Signed with GitHub OIDC Token)
      #   run: |
      #     cosign verify --key github://hoverkraft-tech/ci-bot --output json ghcr.io/hoverkraft-tech/test-multi-arch:0.1.0 | jq .
